name = "superneo_lean"
defaultTargets = ["SuperNeo", "check"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.28.0"

[[lean_lib]]
name = "SuperNeo"
globs = ["SuperNeo"]

[[lean_exe]]
name = "check"
root = "Main"

[[lean_exe]]
name = "goldilocks-golden"
root = "SuperNeo.Golden.GoldilocksGolden"

[[lean_lib]]
name = "SumCheckTests"
globs = ["tests.+"]
