name = "twist_shout_lean"
defaultTargets = ["TwistShout", "check"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.28.0"

[[lean_lib]]
name = "TwistShout"

[[lean_exe]]
name = "check"
root = "Main"

[[lean_lib]]
name = "TwistShoutTests"
globs = ["tests.+"]
