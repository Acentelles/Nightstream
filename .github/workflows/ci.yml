name: Test Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt

    - name: Check formatting
      run: cargo fmt --all --check

  test:
    name: Run Tests
    runs-on: self-hosted
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
          
    - name: Run tests
      run: NEO_PI_CCS_PREFLIGHT=1 NEO_SELF_VERIFY=1 NEO_STRICT_IO_PARITY=1 cargo test --release --workspace --features "testing,debug-log,fs-guard"

  mojo-cpu-parity:
    name: Real Mojo CPU Parity
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2

    - name: Install pixi
      run: curl -fsSL https://pixi.sh/install.sh | bash

    - name: Add pixi to PATH
      run: echo "$HOME/.pixi/bin" >> "$GITHUB_PATH"

    - name: Warm Mojo toolchain
      working-directory: gpu/mojo
      run: pixi install

    - name: Run real Mojo CPU parity tests
      env:
        CARGO_BUILD_JOBS: 1
      run: |
        set -euxo pipefail
        cargo test -p neo-gpu --release --test loader real_mojo_cpu_session_ignores_nonzero_device_id -- --ignored --exact
        cargo test -p neo-gpu --release --test loader real_mojo_poseidon2_matches_cpu_reference -- --ignored --exact
        cargo test -p neo-gpu --release --test loader real_mojo_split_nc_probe_and_minimal_eval_work -- --ignored --exact
        cargo test -p neo-reductions --release --test split_nc_gpu_parity real_mojo_split_nc_high_batch_nc_oracle_matches_cpu_across_rounds -- --ignored --exact
        cargo test -p neo-reductions --release --test split_nc_gpu_parity real_mojo_split_nc_optimized_prove_matches_cpu_and_verifies -- --ignored --exact
        cargo test -p neo-fold --release --test integration suite::ccs_only_mcs_batched::ccs_only_mcs_batched_seeded_real_mojo_cpu_matches_cpu -- --ignored --exact

  # ============================================================================
  # WASM Build Checks (with Spartan)
  # Ensures web-wasm, ios-wasm, and android-wasm builds don't break
  # ============================================================================

  wasm-builds:
    name: WASM Builds (Web/iOS/Android)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust (wasm32 + rust-src)
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
        components: rust-src
    
    - name: Install Rust (nightly-2025-09-01 wasm32 + rust-src)
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: nightly-2025-09-01
        targets: wasm32-unknown-unknown
        components: rust-src

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: demos/wasm-demo/wasm

    - name: Install wasm-pack
      uses: jetli/wasm-pack-action@v0.4.0

    - name: Build WASM bundles (Web/iOS/Android)
      run: ./demos/build_wasm.sh --release
      env:
        RUSTUP_TOOLCHAIN: stable
        WASM_THREADS_TOOLCHAIN: nightly-2025-09-01
